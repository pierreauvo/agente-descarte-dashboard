<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agente de Descartes — Auvo</title>
<style>
  :root {
    --bg: #0f1117;
    --card: #171a23;
    --border: #2a2e3a;
    --text: #e6e8ee;
    --muted: #8b8fa3;
    --critico: #e74c3c;
    --alto: #e67e22;
    --medio: #f1c40f;
    --operacao: #e74c3c;
    --estrutural: #3498db;
    --qualidade: #2ecc71;
    --auvohub: #9b59b6;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    padding: 24px;
  }
  .wrap { max-width: 1100px; margin: 0 auto; }
  h1 { font-size: 22px; margin: 0 0 4px; }
  .subtitle { color: var(--muted); font-size: 13px; margin-bottom: 24px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; margin-bottom: 24px; }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
  }
  .card .label { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: 0.04em; }
  .card .value { font-size: 28px; font-weight: 600; margin-top: 4px; }
  .bar-row { display: flex; align-items: center; gap: 8px; margin: 6px 0; font-size: 13px; }
  .bar-label { width: 90px; flex-shrink: 0; color: var(--muted); }
  .bar-track { flex: 1; background: #1f2330; border-radius: 4px; height: 8px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 4px; }
  .bar-pct { width: 42px; text-align: right; flex-shrink: 0; }
  section { margin-bottom: 28px; }
  section h2 { font-size: 15px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); margin-bottom: 12px; }
  .alerta {
    border-left: 3px solid var(--medio);
    background: var(--card);
    border-radius: 6px;
    padding: 10px 14px;
    margin-bottom: 8px;
    font-size: 13px;
  }
  .alerta.CRITICO { border-color: var(--critico); }
  .alerta.ALTO { border-color: var(--alto); }
  .alerta.MEDIO { border-color: var(--medio); }
  .alerta .nivel { font-weight: 700; font-size: 11px; letter-spacing: 0.05em; margin-right: 8px; }
  .alerta.CRITICO .nivel { color: var(--critico); }
  .alerta.ALTO .nivel { color: var(--alto); }
  .alerta.MEDIO .nivel { color: var(--medio); }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--border); }
  th { color: var(--muted); font-weight: 500; font-size: 11px; text-transform: uppercase; letter-spacing: 0.03em; }
  tr:hover td { background: #1a1d28; }
  .tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
  .tag.OPERACAO { background: rgba(231,76,60,0.15); color: var(--operacao); }
  .tag.ESTRUTURAL { background: rgba(52,152,219,0.15); color: var(--estrutural); }
  .tag.QUALIDADE { background: rgba(46,204,113,0.15); color: var(--qualidade); }
  .tag.AUVOHUB { background: rgba(155,89,182,0.15); color: var(--auvohub); }
  a { color: #6ea8fe; text-decoration: none; }
  a:hover { text-decoration: underline; }
  .empty { color: var(--muted); font-size: 13px; padding: 20px; text-align: center; }
  .table-wrap { overflow-x: auto; }
  select {
    background: var(--card); color: var(--text); border: 1px solid var(--border);
    border-radius: 6px; padding: 6px 10px; font-size: 13px; margin-bottom: 12px;
  }
</style>
</head>
<body>
<div class="wrap">
  <h1>Agente de Descartes — Auvo</h1>
  <div class="subtitle" id="subtitle">Carregando...</div>

  <div class="grid" id="cards"></div>

  <section>
    <h2>Distribuicao por categoria</h2>
    <div class="card" id="categoriaBars"></div>
  </section>

  <section>
    <h2>Alertas do dia</h2>
    <div id="alertas"></div>
  </section>

  <section>
    <h2>Descartes recentes</h2>
    <select id="filtroCategoria">
      <option value="">Todas as categorias</option>
      <option value="OPERACAO">OPERACAO</option>
      <option value="ESTRUTURAL">ESTRUTURAL</option>
      <option value="QUALIDADE">QUALIDADE</option>
      <option value="AUVOHUB">AUVOHUB</option>
    </select>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Data</th><th>Empresa</th><th>SDR</th><th>Categoria</th>
            <th>Motivo registrado</th><th>SLA (h)</th><th></th>
          </tr>
        </thead>
        <tbody id="tabelaDescartes"></tbody>
      </table>
    </div>
  </section>
</div>

<script>
const SUPABASE_URL = "https://exxqtkcmwzjypelyjpmo.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV4eHF0a2Ntd3pqeXBlbHlqcG1vIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkxMzg4NzgsImV4cCI6MjA5NDcxNDg3OH0.tQIy8HBxuzR6gkwDPeD3PnAv-mt0hjhl18epYlEJ_9c";

async function supabaseGet(path) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    headers: {
      apikey: SUPABASE_ANON_KEY,
      Authorization: `Bearer ${SUPABASE_ANON_KEY}`,
    },
  });
  if (!res.ok) throw new Error(`Supabase ${res.status}: ${await res.text()}`);
  return res.json();
}

const CATEGORIA_COLOR = {
  OPERACAO: "var(--operacao)",
  ESTRUTURAL: "var(--estrutural)",
  QUALIDADE: "var(--qualidade)",
  AUVOHUB: "var(--auvohub)",
};

function renderCards(report) {
  const cards = document.getElementById("cards");
  if (!report) {
    cards.innerHTML = `<div class="card"><div class="label">Sem dados</div><div class="value">—</div></div>`;
    return;
  }
  cards.innerHTML = `
    <div class="card"><div class="label">Total de descartes</div><div class="value">${report.total_descartes}</div></div>
    <div class="card"><div class="label">SLA medio (horas uteis)</div><div class="value">${report.sla_media_horas ?? "—"}</div></div>
    <div class="card"><div class="label">Dentro do SLA (4h)</div><div class="value">${report.sla_pct_dentro ?? 0}%</div></div>
    <div class="card"><div class="label">Motivos incorretos</div><div class="value">${report.flags_motivo_incorreto ?? 0}</div></div>
  `;
}

function renderCategoriaBars(reportJson) {
  const el = document.getElementById("categoriaBars");
  const breakdown = reportJson?.breakdown_categoria ?? {};
  const entries = Object.entries(breakdown);
  if (entries.length === 0) {
    el.innerHTML = `<div class="empty">Sem dados de categoria.</div>`;
    return;
  }
  el.innerHTML = entries
    .map(
      ([cat, b]) => `
      <div class="bar-row">
        <div class="bar-label">${cat}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${b.pct}%;background:${CATEGORIA_COLOR[cat] || "#888"}"></div></div>
        <div class="bar-pct">${b.pct}%</div>
      </div>`
    )
    .join("");
}

function renderAlertas(reportJson) {
  const el = document.getElementById("alertas");
  const alertas = reportJson?.alertas ?? [];
  if (alertas.length === 0) {
    el.innerHTML = `<div class="empty">Nenhum alerta no dia mais recente.</div>`;
    return;
  }
  el.innerHTML = alertas
    .map(
      (a) => `
      <div class="alerta ${a.nivel}">
        <span class="nivel">${a.nivel}</span>${a.mensagem}
        <span style="color:var(--muted)"> — ${a.deals_afetados} deals</span>
      </div>`
    )
    .join("");
}

function renderTabela(rows) {
  const tbody = document.getElementById("tabelaDescartes");
  if (rows.length === 0) {
    tbody.innerHTML = `<tr><td colspan="7" class="empty">Nenhum descarte encontrado.</td></tr>`;
    return;
  }
  tbody.innerHTML = rows
    .map(
      (r) => `
      <tr>
        <td>${r.data_descarte ?? "—"}</td>
        <td>${r.empresa ?? "—"}</td>
        <td>${r.sdr ?? "—"}</td>
        <td><span class="tag ${r.classificacao}">${r.classificacao ?? "—"}</span></td>
        <td>${r.motivo_registrado_micro ?? "—"}</td>
        <td>${r.sla_primeira_ligacao_horas ?? "—"}</td>
        <td>${r.link_hubspot ? `<a href="${r.link_hubspot}" target="_blank" rel="noopener">HubSpot →</a>` : ""}</td>
      </tr>`
    )
    .join("");
}

let allRows = [];

function applyFiltro() {
  const filtro = document.getElementById("filtroCategoria").value;
  const filtered = filtro ? allRows.filter((r) => r.classificacao === filtro) : allRows;
  renderTabela(filtered);
}

async function main() {
  const subtitle = document.getElementById("subtitle");
  try {
    const reports = await supabaseGet(
      "daily_reports?select=*&order=report_date.desc&limit=1"
    );
    const latest = reports[0];
    renderCards(latest);
    renderCategoriaBars(latest?.report_json);
    renderAlertas(latest?.report_json);
    subtitle.textContent = latest
      ? `Ultimo relatorio: ${latest.report_date}`
      : "Nenhum relatorio gerado ainda.";

    allRows = await supabaseGet(
      "discard_analyses?select=data_descarte,empresa,sdr,classificacao,motivo_registrado_micro,sla_primeira_ligacao_horas,link_hubspot&order=data_descarte.desc&limit=200"
    );
    applyFiltro();
  } catch (err) {
    subtitle.textContent = `Erro ao carregar dados: ${err.message}`;
    console.error(err);
  }
}

document.getElementById("filtroCategoria").addEventListener("change", applyFiltro);
main();
</script>
</body>
</html>
